<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ScolarTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        @media (max-width: 576px) {
            .login-container {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="w-100" style="max-width: 400px;">
            <div class="bg-white rounded-3 p-4 p-sm-5 mx-3 mx-sm-0 shadow-sm">
                <div class="logo text-center mb-4 mb-sm-5">
                    <h2 class="text-primary mb-1">Gestion Scolaire</h2>
                    <p class="text-muted mb-0">Création de compte</p>
                </div>
                
                <div id="alert-message" class="alert d-none" role="alert"></div>
                
                <form id="registerForm">
                    <div class="mb-3 mb-sm-4">
                        <label for="nom" class="form-label">Nom complet</label>
                        <input type="text" class="form-control form-control-lg" id="nom" name="nom" required>
                    </div>
                    <div class="mb-3 mb-sm-4">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" required>
                    </div>
                    <div class="mb-3 mb-sm-4">
                        <label for="mot_de_passe" class="form-label">Mot de passe</label>
                        <input type="password" class="form-control form-control-lg" id="mot_de_passe" name="mot_de_passe" required>
                    </div>
                    <div class="mb-3 mb-sm-4">
                        <label for="confirm_mot_de_passe" class="form-label">Confirmer le mot de passe</label>
                        <input type="password" class="form-control form-control-lg" id="confirm_mot_de_passe" name="confirm_mot_de_passe" required>
                    </div>
                    <div class="mb-3 mb-sm-4 form-check">
                        <input type="checkbox" class="form-check-input" id="roleAdmin" name="role" value="admin">
                        <label class="form-check-label" for="roleAdmin">
                            Créer un compte administrateur (nécessite une approbation)
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">S'inscrire</button>
                </form>
                
                <div class="mt-3 mt-sm-4 text-center">
                    <p class="mb-0">Déjà un compte ? <a href="connexion.html" class="text-decoration-none">Connectez-vous ici</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nom = document.getElementById('nom').value.trim();
            const email = document.getElementById('email').value.trim();
            const mot_de_passe = document.getElementById('mot_de_passe').value;
            const confirm_mot_de_passe = document.getElementById('confirm_mot_de_passe').value;
            const role = document.getElementById('roleAdmin').checked ? 'admin' : 'utilisateur';
            
            const alertDiv = document.getElementById('alert-message');
            
            // Basic validation
            if (nom === '' || email === '' || mot_de_passe === '' || confirm_mot_de_passe === '') {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Tous les champs sont requis';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            if (!email.includes('@')) {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Veuillez entrer un email valide';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            if (mot_de_passe.length < 6) {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            if (mot_de_passe !== confirm_mot_de_passe) {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Les mots de passe ne correspondent pas';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            // Disable button during request
            const submitButton = this.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Inscription en cours...';
            
            const formData = new FormData();
            formData.append('nom', nom);
            formData.append('email', email);
            formData.append('mot_de_passe', mot_de_passe);
            formData.append('role', role);
            
            fetch('https://gestion-scolaire-production-5e27.up.railway.app/backends/auth/register.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = data.message + ' Vous pouvez maintenant vous connecter.';
                    alertDiv.classList.remove('d-none');
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'connexion.html';
                    }, 2000);
                } else {
                    alertDiv.className = 'alert alert-danger';
                    alertDiv.textContent = data.message;
                    alertDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Erreur de connexion: ' + error.message;
                alertDiv.classList.remove('d-none');
            })
            .finally(() => {
                submitButton.disabled = false;
                submitButton.textContent = 'S\'inscrire';
            });
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
