<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Gestion Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="logo">
                <h2>Gestion Scolaire</h2>
                <p class="text-muted">Création de compte</p>
            </div>
            
            <div id="alert-message" class="alert d-none" role="alert"></div>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label for="nom" class="form-label">Nom complet</label>
                    <input type="text" class="form-control" id="nom" name="nom" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="mot_de_passe" class="form-label">Mot de passe</label>
                    <input type="password" class="form-control" id="mot_de_passe" name="mot_de_passe" required>
                </div>
                <div class="mb-3">
                    <label for="confirm_mot_de_passe" class="form-label">Confirmer le mot de passe</label>
                    <input type="password" class="form-control" id="confirm_mot_de_passe" name="confirm_mot_de_passe" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="roleAdmin" name="role" value="admin">
                    <label class="form-check-label" for="roleAdmin">
                        Créer un compte administrateur (nécessite une approbation)
                    </label>
                </div>
                <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
            </form>
            
            <div class="mt-3 text-center">
                <p>Déjà un compte ? <a href="connexion.html">Connectez-vous ici</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nom = document.getElementById('nom').value.trim();
            const email = document.getElementById('email').value.trim();
            const mot_de_passe = document.getElementById('mot_de_passe').value;
            const confirm_mot_de_passe = document.getElementById('confirm_mot_de_passe').value;
            const role = document.getElementById('roleAdmin').checked ? 'admin' : 'utilisateur';
            
            const alertDiv = document.getElementById('alert-message');
            
            // Basic validation
            if (nom === '' || email === '' || mot_de_passe === '' || confirm_mot_de_passe === '') {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Tous les champs sont requis';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            if (!email.includes('@')) {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Veuillez entrer un email valide';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            if (mot_de_passe.length < 6) {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            if (mot_de_passe !== confirm_mot_de_passe) {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Les mots de passe ne correspondent pas';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            // Disable button during request
            const submitButton = this.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Inscription en cours...';
            
            const formData = new FormData();
            formData.append('nom', nom);
            formData.append('email', email);
            formData.append('mot_de_passe', mot_de_passe);
            formData.append('role', role);
            
            fetch('../backends/auth/register.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = data.message + ' Vous pouvez maintenant vous connecter.';
                    alertDiv.classList.remove('d-none');
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'connexion.html';
                    }, 2000);
                } else {
                    alertDiv.className = 'alert alert-danger';
                    alertDiv.textContent = data.message;
                    alertDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Erreur de connexion: ' + error.message;
                alertDiv.classList.remove('d-none');
            })
            .finally(() => {
                submitButton.disabled = false;
                submitButton.textContent = 'S\'inscrire';
            });
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
