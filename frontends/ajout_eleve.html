<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Élève - ScolarTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        @media (max-width: 576px) {
            .container {
                padding: 15px;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="container mt-4 mt-sm-5 px-3 px-sm-4">

<h2 class="h3 h-sm-2 mb-4">Ajouter un élève</h2>

<form action="https://gestion-scolaire-production-5e27.up.railway.app/backends/eleves/create.php" method="POST" enctype="multipart/form-data">
    
    <input type="text" name="matricule" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Matricule">

    <input type="text" name="nom" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Nom">

    <input type="text" name="prenom" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Prénom">

    <select name="sexe" class="form-control form-control-lg mb-3 mb-sm-2">
        <option value="M">Masculin</option>
        <option value="F">Féminin</option>
    </select>

    <input type="date" name="date_naissance" class="form-control form-control-lg mb-3 mb-sm-2">

    <input type="text" name="nom_parent" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Nom parent">

    <input type="text" name="telephone_parent" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Téléphone parent">

    <textarea name="adresse" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Adresse"></textarea>

    <select name="code_classe" class="form-control form-control-lg mb-3 mb-sm-2">
        <option value="">Sélectionnez une classe</option>
    </select>

    <button type="submit" name="ajouter" class="btn btn-success btn-lg w-100 w-sm-auto">
        Ajouter
    </button>

</form>

<script>
fetch('https://gestion-scolaire-production-5e27.up.railway.app/backends/classes/read.php')
    .then(response => response.json())
    .then(classes => {
        const classeSelect = document.querySelector('select[name="code_classe"]');
        classes.forEach(classe => {
            const option = document.createElement('option');
            option.value = classe.id;
            option.textContent = classe.nom_classe;
            classeSelect.appendChild(option);
        });
    })
    .catch(error => {
        console.error('Erreur lors du chargement des classes:', error);
    });
</script>

</body>
</html>
