<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Élève - ScolarTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        @media (max-width: 576px) {
            .container {
                padding: 15px;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="container mt-4 mt-sm-5 px-3 px-sm-4">

<h2 class="h3 h-sm-2 mb-4">Ajouter un élève</h2>

<div id="alert-message" class="alert d-none" role="alert"></div>

<form id="addStudentForm">
    
    <input type="text" name="matricule" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Matricule">

    <input type="text" name="nom" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Nom" required>

    <input type="text" name="prenom" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Prénom" required>

    <select name="sexe" class="form-control form-control-lg mb-3 mb-sm-2">
        <option value="M">Masculin</option>
        <option value="F">Féminin</option>
    </select>

    <input type="date" name="date_naissance" class="form-control form-control-lg mb-3 mb-sm-2">

    <input type="text" name="nom_parent" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Nom parent">

    <input type="text" name="telephone_parent" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Téléphone parent">

    <textarea name="adresse" class="form-control form-control-lg mb-3 mb-sm-2" placeholder="Adresse"></textarea>

    <select name="code_classe" class="form-control form-control-lg mb-3 mb-sm-2" required>
        <option value="">Sélectionnez une classe</option>
    </select>

    <button type="submit" class="btn btn-success btn-lg w-100 w-sm-auto">
        Ajouter
    </button>

</form>

<script>
const RAILWAY_BASE_URL = 'https://gestion-scolaire-production-5e27.up.railway.app';

// =========================================================================
// 1. CHARGEMENT DYNAMIQUE DES CLASSES DEPUIS RAILWAY
// =========================================================================
fetch(`${RAILWAY_BASE_URL}/backends/classes/read.php`)
    .then(response => response.json())
    .then(classes => {
        const classeSelect = document.querySelector('select[name="code_classe"]');
        classes.forEach(classe => {
            const option = document.createElement('option');
            // IMPORTANT : On envoie le code_classe (ex: CM2) ou l'identifiant selon ce que ton create.php attend
            option.value = classe.code_classe || classe.id; 
            option.textContent = classe.nom_classe;
            classeSelect.appendChild(option);
        });
    })
    .catch(error => {
        console.error('Erreur lors du chargement des classes:', error);
    });

// =========================================================================
// 2. INTERCEPTION DE LA SOUMISSION ET ENVOI SÉCURISÉ EN ARRIÈRE-PLAN
// =========================================================================
document.getElementById('addStudentForm').addEventListener('submit', function(e) {
    e.preventDefault(); // 🔒 BLOQUE le rechargement sauvage et la redirection forcée !
    
    const alertDiv = document.getElementById('alert-message');
    const submitButton = this.querySelector('button[type="submit"]');
    
    submitButton.disabled = true;
    submitButton.textContent = 'Ajout en cours...';

    // Extraction des données du formulaire
    const formData = new FormData(this);
    const formObject = {};
    formData.forEach((value, key) => {
        formObject[key] = value;
    });

    // Envoi propre au backend en format JSON
    fetch(`${RAILWAY_BASE_URL}/backends/eleves/create.php`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(formObject)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alertDiv.className = 'alert alert-success';
            alertDiv.textContent = 'Élève ajouté avec succès !';
            alertDiv.classList.remove('d-none');
            this.reset(); // Vide les champs du formulaire après succès
            
            // Redirection douce vers la liste après 2 secondes
            setTimeout(() => {
                window.location.href = 'liste.html';
            }, 2000);
        } else {
            alertDiv.className = 'alert alert-danger';
            alertDiv.textContent = data.message || "Une erreur est survenue lors de l'ajout.";
            alertDiv.classList.remove('d-none');
        }
    })
    .catch(error => {
        alertDiv.className = 'alert alert-danger';
        alertDiv.textContent = "Erreur réseau : Impossible de joindre le serveur Railway.";
        alertDiv.classList.remove('d-none');
    })
    .finally(() => {
        submitButton.disabled = false;
        submitButton.textContent = 'Ajouter';
    });
});
</script>

</body>
</html>
