<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ajouter élève</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Ajouter un élève</h2>

<form action="../backends/eleves/create.php" method="POST" enctype="multipart/form-data">
    
    <input type="text" name="matricule" class="form-control mb-2" placeholder="Matricule">

    <input type="text" name="nom" class="form-control mb-2" placeholder="Nom">

    <input type="text" name="prenom" class="form-control mb-2" placeholder="Prénom">

    <select name="sexe" class="form-control mb-2">
        <option value="M">Masculin</option>
        <option value="F">Féminin</option>
    </select>

    <input type="date" name="date_naissance" class="form-control mb-2">

    <input type="text" name="nom_parent" class="form-control mb-2" placeholder="Nom parent">

    <input type="text" name="telephone_parent" class="form-control mb-2" placeholder="Téléphone parent">

    <textarea name="adresse" class="form-control mb-2" placeholder="Adresse"></textarea>

    <select name="classe_id" class="form-control mb-2">
        <option value="">Sélectionnez une classe</option>
        <!-- Ces options seront remplies dynamiquement via JavaScript ou PHP -->
    </select>

    <button type="submit" name="ajouter" class="btn btn-success">
        Ajouter
    </button>

</form>

<script>
// Charger les classes depuis l'API et les ajouter au select
fetch('../backends/classes/read.php')
    .then(response => response.json())
    .then(classes => {
        const classeSelect = document.querySelector('select[name="classe_id"]');
        classes.forEach(classe => {
            const option = document.createElement('option');
            option.value = classe.id;
            option.textContent = classe.nom_classe;
            classeSelect.appendChild(option);
        });
    })
    .catch(error => {
        console.error('Erreur lors du chargement des classes:', error);
        // Optionnel: afficher un message à l'utilisateur
    });
</script>

</body>
</html>
