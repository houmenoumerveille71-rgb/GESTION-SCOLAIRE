<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Module de Caisse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Bibliothèque html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* Nettoyage du @media print qui masquait tout le contenu lors de la génération */
        .receipt-box {
            max-width: 500px;
            margin: 20px auto;
            padding: 25px;
            border: 2px dashed #000;
            background: #fff;
        }
        @media (max-width: 576px) {
            .container {
                padding: 15px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .receipt-box {
                padding: 15px;
                margin: 10px;
            }
            .no-print .card {
                padding: 15px;
            }
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="container mt-4 mt-sm-5 px-3 px-sm-4">

    <div class="no-print">
        <div class="row align-items-center mb-4">
            <div class="col-12 col-sm-8">
                <h2 class="h3 h-sm-2 mb-0">Enregistrement d'un paiement</h2>
            </div>
            <div class="col-12 col-sm-4 mt-2 mt-sm-0">
                <a href="index.html" class="btn btn-outline-secondary btn-sm w-100 w-sm-auto">
                    ← Retour
                </a>
            </div>
        </div>
                
        <div class="card mb-3">
            <div class="card-body">
                <div class="mb-3">
                    <label for="search" class="form-label fw-bold">Rechercher un élève</label>
                    <input type="text" id="search" class="form-control form-control-lg" placeholder="Nom, prénom ou matricule...">
                </div>
            </div>
        </div>
                
        <div id="eleve-info" class="card mb-3" style="display:none;">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Informations de l'élève</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <p class="mb-1"><strong>Élève :</strong></p>
                        <p class="fs-5" id="eleve-nom"></p>
                    </div>
                    <div class="col-12 col-md-6">
                        <p class="mb-1"><strong>Classe :</strong></p>
                        <p class="fs-5" id="eleve-classe"></p>
                    </div>
                    <div class="col-6 col-md-3">
                        <p class="mb-1 text-muted"><small>Total dû</small></p>
                        <p class="fw-bold mb-0" id="eleve-total"></p>
                    </div>
                    <div class="col-6 col-md-3">
                        <p class="mb-1 text-muted"><small>Déjà payé</small></p>
                        <p class="text-success fw-bold mb-0" id="eleve-paye"></p>
                    </div>
                    <div class="col-6 col-md-3">
                        <p class="mb-1 text-muted"><small>Reste à payer</small></p>
                        <p class="text-danger fw-bold mb-0" id="eleve-reste"></p>
                    </div>
                </div>
            </div>
        </div>
                
        <form id="paiement-form" style="display:none;" class="mb-4">
            <input type="hidden" id="eleve-id">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Nouveau versement</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="montant" class="form-label fw-bold">Montant du versement (FCFA)</label>
                        <input type="number" id="montant" class="form-control form-control-lg" min="1" placeholder="Ex: 50000" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 w-sm-auto">
                        ✓ Valider le paiement
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- Le reçu HTML -->
    <div id="receipt" style="display:none;" class="receipt-box">
        <div class="text-center mb-3">
            <h3>REÇU DE PAIEMENT</h3>
            <p class="fw-bold">N° <span id="recu-numero" class="text-danger"></span></p>
        </div>
        <hr>
        <p><strong>Date :</strong> <span id="recu-date"></span></p>
        <p><strong>Élève :</strong> <span id="recu-nom"></span></p>
        <p><strong>Classe / Niveau :</strong> <span id="recu-classe"></span></p>
        <p><strong>Montant Versé :</strong> <span id="recu-montant" class="fw-bold"></span></p>
        <p><strong>Reste à Payer :</strong> <span id="recu-reste" class="text-danger fw-bold"></span></p>
        <hr>
        <div class="row mt-4">
            <div class="col-6"></div>
            <div class="col-6 text-center" style="font-size: 14px;">
                <p><strong>Nom & Signature du Caissier</strong></p>
                <p class="mt-2 text-muted" id="recu-caissier"></p>
                <div style="margin-top: 50px; border-top: 1px dashed #ccc;"></div>
            </div>
        </div>
        <div class="text-center mt-4">
            <button type="button" onclick="telechargerRecu()" class="btn btn-success btn-download">
                <i class="fa-solid fa-file-pdf"></i> Télécharger le reçu
            </button>
        </div>
    </div>

<script>
let searchTimeout;
function formatArgent(montant) {    
    return new Intl.NumberFormat('fr-FR').format(montant) + " FCFA";
}

function telechargerRecu() {
    const element = document.getElementById('receipt');
    const bouton = document.querySelector('.btn-download');
    const nomEleve = document.getElementById('recu-nom').textContent.trim().replace(/\s+/g, '_');
    const numeroRecu = document.getElementById('recu-numero').textContent.trim();

    // On cache proprement le bouton pour éviter qu'il s'imprime
    bouton.style.visibility = 'hidden';

    const options = {
        margin:       10,
        filename:     `Recu_${numeroRecu}_${nomEleve}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { 
            scale: 2, 
            useCORS: true,
            backgroundColor: '#ffffff'
        },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    // On lance la génération sur l'élément visible à l'écran
    html2pdf().set(options).from(element).save().then(() => {
        bouton.style.visibility = 'visible';
    }).catch(err => {
        console.error(err);
        bouton.style.visibility = 'visible';
    });
}

document.getElementById('search').addEventListener('input', function() {    
    clearTimeout(searchTimeout);    
    if (this.value.trim() === "") {        
        document.getElementById('eleve-info').style.display = 'none';        
        document.getElementById('paiement-form').style.display = 'none';        
        document.getElementById('receipt').style.display = 'none';        
        return;    
    }

    searchTimeout = setTimeout(() => {        
        fetch('https://gestion-scolaire-production-5e27.up.railway.app/backends/eleves/read.php?q=' + encodeURIComponent(this.value))            
            .then(res => res.json())            
            .then(data => {                
                if (Array.isArray(data) && data.length > 0) {                    
                    let eleve = data[0];                                        
                    document.getElementById('receipt').style.display = 'none';                                        
                    document.getElementById('eleve-id').value = eleve.id;                    
                    document.getElementById('eleve-nom').textContent = (eleve.nom || '').toUpperCase() + ' ' + (eleve.prenom || '');                    
                    document.getElementById('eleve-classe').textContent = eleve.nom_classe ;                                        
                    document.getElementById('eleve-total').setAttribute('data-val', eleve.total_attendu);                    
                    document.getElementById('eleve-paye').setAttribute('data-val', eleve.total_paye);                                        
                    document.getElementById('eleve-total').textContent = formatArgent(eleve.total_attendu);                    
                    document.getElementById('eleve-paye').textContent = formatArgent(eleve.total_paye);                    
                    document.getElementById('eleve-reste').textContent = formatArgent(eleve.reste_a_payer);                                        
                    document.getElementById('eleve-info').style.display = 'block';                    
                    document.getElementById('paiement-form').style.display = 'block';                
                } else {                    
                    document.getElementById('eleve-info').style.display = 'none';                    
                    document.getElementById('paiement-form').style.display = 'none';                    
                    document.getElementById('receipt').style.display = 'none';                
                }            
            })            
            .catch(err => console.error("Erreur de recherche:", err));    
    }, 400);
});

document.getElementById('paiement-form').addEventListener('submit', function(e) {    
    e.preventDefault();    
    const formData = new FormData();    
    formData.append('eleve_id', document.getElementById('eleve-id').value);    
    formData.append('montant', document.getElementById('montant').value);        
    
    fetch('https://gestion-scolaire-production-5e27.up.railway.app/backends/paiements/create.php', { method: 'POST', body: formData })        
        .then(res => res.json())        
        .then(res => {            
            if (res.success) {                
                document.getElementById('recu-numero').textContent = res.data.numero_recu;                
                document.getElementById('recu-date').textContent = res.data.date_paiement;                
                document.getElementById('recu-nom').textContent = document.getElementById('eleve-nom').textContent;                
                document.getElementById('recu-classe').textContent = document.getElementById('eleve-classe').textContent;                
                document.getElementById('recu-montant').textContent = formatArgent(res.data.montant_paye);                
                document.getElementById('recu-reste').textContent = formatArgent(res.data.reste_a_payer);                
                document.getElementById('recu-caissier').textContent = res.data.caissier;                                
                
                document.getElementById('eleve-reste').textContent = formatArgent(res.data.reste_a_payer);                                
                let ancienPaye = parseFloat(document.getElementById('eleve-paye').getAttribute('data-val')) || 0;                
                let nouveauVersement = parseFloat(document.getElementById('montant').value) || 0;                
                let cumulPaye = ancienPaye + nouveauVersement;                                
                document.getElementById('eleve-paye').setAttribute('data-val', cumulPaye);                
                document.getElementById('eleve-paye').textContent = formatArgent(cumulPaye);                                
                
                document.getElementById('receipt').style.display = 'block';                
                document.getElementById('montant').value = "";                
                document.getElementById('paiement-form').style.display = 'none';            
            } else {                
                alert(res.message);            
            }        
        })        
        .catch(err => console.error("Erreur d'enregistrement:", err));
});
</script>
</body>
</html>
