<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modifier élève</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Modifier élève</h2>

<form action="../backends/eleves/update.php"
      method="POST"
      enctype="multipart/form-data">

    <!-- ID caché -->
    <input type="hidden" name="id" id="id">

    <!-- Matricule -->
    <label>Matricule</label>
    <input type="text"
           name="matricule"
           id="matricule"
           class="form-control mb-3">

    <!-- Nom -->
    <label>Nom</label>
    <input type="text"
           name="nom"
           id="nom"
           class="form-control mb-3">

    <!-- Prénom -->
    <label>Prénom</label>
    <input type="text"
           name="prenom"
           id="prenom"
           class="form-control mb-3">

    <!-- Sexe -->
    <label>Sexe</label>
    <select name="sexe"
            id="sexe"
            class="form-control mb-3">

        <option value="M">Masculin</option>
        <option value="F">Féminin</option>

    </select>

    <!-- Date naissance -->
    <label>Date naissance</label>
    <input type="date"
           name="date_naissance"
           id="date_naissance"
           class="form-control mb-3">

    <!-- Parent -->
    <label>Nom parent</label>
    <input type="text"
           name="nom_parent"
           id="nom_parent"
           class="form-control mb-3">

    <!-- Téléphone -->
    <label>Téléphone parent</label>
    <input type="text"
           name="telephone_parent"
           id="telephone_parent"
           class="form-control mb-3">

    <!-- Adresse -->
    <label>Adresse</label>
    <textarea name="adresse"
              id="adresse"
              class="form-control mb-3"></textarea>

    <!-- Classe -->
    <label>Classe</label>
    <input type="number"
           name="classe_id"
           id="classe_id"
           class="form-control mb-3">


    <!-- Bouton -->
    <button type="submit"
            name="modifier"
            class="btn btn-success">

        Modifier

    </button>

</form>

<script>

// Récupérer ID URL
const params = new URLSearchParams(window.location.search);

const id = params.get("id");

// Charger les élèves
fetch("../backends/eleves/read.php")

.then(res => res.json())

.then(data => {

    // Trouver l'élève
    let eleve = data.find(e => e.id == id);

    // Remplir formulaire
    document.getElementById("id").value = eleve.id;

    document.getElementById("matricule").value = eleve.matricule;

    document.getElementById("nom").value = eleve.nom;

    document.getElementById("prenom").value = eleve.prenom;

    document.getElementById("sexe").value = eleve.sexe;

    document.getElementById("date_naissance").value = eleve.date_naissance;

    document.getElementById("nom_parent").value = eleve.nom_parent;

    document.getElementById("telephone_parent").value = eleve.telephone_parent;

    document.getElementById("adresse").value = eleve.adresse;

    document.getElementById("classe_id").value = eleve.classe_id;

});

</script>

</body>
</html>
