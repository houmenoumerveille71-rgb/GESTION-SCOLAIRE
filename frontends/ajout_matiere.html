<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ajouter une matière</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Ajouter une matière</h2>

<form action="../backends/matieres/create.php" method="POST">
    
    <!-- Nom de la matière -->
    <div class="mb-3">
        <label for="nom_matiere" class="form-label">Nom de la matière *</label>
        <input type="text" name="nom_matiere" class="form-control" id="nom_matiere" placeholder="Ex: Mathématiques, Français" required>
    </div>
    
    <!-- Bouton -->
    <button type="submit" class="btn btn-primary">Ajouter la matière</button>
    <a href="liste_matieres.html" class="btn btn-secondary">Annuler</a>
    
</form>

</body>
</html>
