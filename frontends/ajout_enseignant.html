<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter enseignant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            .container {
                padding: 15px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .btn-group-actions {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .btn-group-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="container mt-4 mt-sm-5 px-3 px-sm-4">

<h2 class="h3 h-sm-2 mb-4 mb-sm-3">Ajouter un enseignant</h2>

<form action="../backends/enseignants/create.php" method="POST">
    
    <div class="mb-3 mb-sm-4">
        <label for="nom" class="form-label">Nom *</label>
        <input type="text" name="nom" class="form-control form-control-lg" id="nom" placeholder="Nom complet" required>
    </div>
    
    <div class="mb-3 mb-sm-4">
        <label for="telephone" class="form-label">Téléphone</label>
        <input type="tel" name="telephone" class="form-control form-control-lg" id="telephone" placeholder="Numéro de téléphone">
    </div>
    
    <div class="mb-3 mb-sm-4">
        <label for="email" class="form-label">Email *</label>
        <input type="email" name="email" class="form-control form-control-lg" id="email" placeholder="Adresse email" required>
    </div>

    <div class="mb-3 mb-sm-4">
        <label for="classe_id" class="form-label">Classe *</label>
        <select name="classe_id" class="form-control form-control-lg" id="classe_id" required>
            <option value="">Sélectionnez une classe</option>
        </select>
    </div>
    
    <div class="btn-group-actions d-flex flex-column flex-sm-row gap-2">
        <button type="submit" class="btn btn-primary btn-lg">Ajouter l'enseignant</button>
        <a href="liste_enseignants.html" class="btn btn-secondary btn-lg">Annuler</a>
    </div>
    
</form>

<script>
fetch('../backends/classes/read.php')
    .then(response => response.json())
    .then(classes => {
        const classeSelect = document.querySelector('select[name="classe_id"]');
        classes.forEach(classe => {
            const option = document.createElement('option');
            option.value = classe.id;
            option.textContent = classe.nom_classe;
            classeSelect.appendChild(option);
        });
    })
    .catch(error => {
        console.error('Erreur lors du chargement des classes:', error);
    });
</script>

</body>
</html>
