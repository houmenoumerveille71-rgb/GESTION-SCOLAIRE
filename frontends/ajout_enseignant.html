<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ajouter enseignant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Ajouter un enseignant</h2>

<form action="../backends/enseignants/create.php" method="POST">
    
    <div class="mb-3">
        <label for="nom" class="form-label">Nom *</label>
        <input type="text" name="nom" class="form-control" id="nom" placeholder="Nom complet" required>
    </div>
    
    <div class="mb-3">
        <label for="telephone" class="form-label">Téléphone</label>
        <input type="tel" name="telephone" class="form-control" id="telephone" placeholder="Numéro de téléphone">
    </div>
    
    <div class="mb-3">
        <label for="email" class="form-label">Email *</label>
        <input type="email" name="email" class="form-control" id="email" placeholder="Adresse email" required>
    </div>

    <div class="mb-3">
        <label for="classe_id" class="form-label">Classe *</label>
        <select name="classe_id" class="form-control" id="classe_id" required>
            <option value="">Sélectionnez une classe</option>
            <!-- Ces options seront remplies dynamiquement via JavaScript -->
        </select>
    </div>
    
    <button type="submit" class="btn btn-primary">Ajouter l'enseignant</button>
    <a href="liste_enseignants.html" class="btn btn-secondary">Annuler</a>
    
</form>

<script>
// Charger les classes depuis l'API et les ajouter au select
fetch('../backends/classes/read.php')
    .then(response => response.json())
    .then(classes => {
        const classeSelect = document.querySelector('select[name="classe_id"]');
        classes.forEach(classe => {
            const option = document.createElement('option');
            option.value = classe.id;
            option.textContent = classe.nom_classe;
            classeSelect.appendChild(option);
        });
    })
    .catch(error => {
        console.error('Erreur lors du chargement des classes:', error);
    });
</script>

</body>
</html>
