<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste élèves</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            .container {
                padding: 15px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .table-responsive {
                font-size: 0.85rem;
            }
            .btn-group-actions {
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .btn-group-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body class="container mt-4 mt-sm-5 px-3 px-sm-4">

<h2 class="h3 h-sm-2 mb-4">Liste des élèves</h2>
<div class="d-flex flex-column flex-sm-row justify-content-between mb-3 gap-2">
    <div>
        <a href="ajout_eleve.html" class="btn btn-primary btn-lg btn-sm-lg">
            <span>➕</span> Ajouter élève
        </a>
    </div>
</div>
<div class="table-responsive">
<table class="table table-bordered table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>Matricule</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th class="text-center">Actions</th>
        </tr>
    </thead>

    <tbody id="data"></tbody>
</table>
</div>

<script>
// Vérification d'authentification (seulement si pas dans un iframe)
(function() {
    if (window.self === window.top) {
        fetch("../backends/auth/check.php")
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    window.location.href = "connexion.html";
                }
            })
            .catch(() => {
                window.location.href = "connexion.html";
            });
    }
})();

fetch("../backends/eleves/read.php")
.then(res => res.json())
.then(data => {

    let table = "";

    data.forEach(eleve => {
table += `
         <tr>
             <td>${eleve.id}</td>
             <td>${eleve.matricule}</td>
             <td>${eleve.nom}</td>
             <td>${eleve.prenom}</td>
             <td class="text-center">
                 <div class="btn-group-actions">
                     <a href="../backends/eleves/delete.php?id=${eleve.id}" 
                        onclick="return confirm('Supprimer ?')"
                        class="btn btn-danger btn-sm">
                         Supprimer
                     </a>
                     <a href="edit.html?id=${eleve.id}"
                        class="btn btn-warning btn-sm">
                        Modifier
                     </a>
                 </div>
             </td>
         </tr>
         `;
    });

    document.getElementById("data").innerHTML = table;

});
</script>


</body>
</html>
