<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Liste élèves</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Liste des élèves</h2>
<div class="d-flex justify-content-between mb-3">
    <div>
        <a href="ajout_eleve.html" class="btn btn-primary" style="text-decoration: none;">
            <span>➕</span> Ajouter élève
        </a>
    </div>
</div>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Matricule</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Supprimer</th>
            <th>Modifier</th>
        </tr>
    </thead>

    <tbody id="data"></tbody>
</table>

<script>
// Vérification d'authentification (seulement si pas dans un iframe)
(function() {
    if (window.self === window.top) {
        fetch("../backends/auth/check.php")
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    window.location.href = "connexion.html";
                }
            })
            .catch(() => {
                window.location.href = "connexion.html";
            });
    }
})();

fetch("../backends/eleves/read.php")
.then(res => res.json())
.then(data => {

    let table = "";

    data.forEach(eleve => {
        table += `
        <tr>
            <td>${eleve.id}</td>
            <td>${eleve.matricule}</td>
            <td>${eleve.nom}</td>
            <td>${eleve.prenom}</td>
            <td>
                <a href="../backends/eleves/delete.php?id=${eleve.id}" 
                   onclick="return confirm('Supprimer ?')"
                   class="btn btn-danger btn-sm">
                    Supprimer
                </a>
            </td>
            <td>
                <a href="edit.html?id=${eleve.id}"
                   class="btn btn-warning btn-sm">
                   Modifier
                </a>
            </td>
        </tr>
        `;
    });

    document.getElementById("data").innerHTML = table;

});
</script>


</body>
</html>
