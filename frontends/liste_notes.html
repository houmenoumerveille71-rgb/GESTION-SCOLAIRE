<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Liste des notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Liste des notes</h2>

<a href="ajout_note.html" class="btn btn-primary mb-3">Ajouter une note</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Élève</th>
            <th>Matière</th>
            <th>Note</th>
            <th>Semestre</th>
            <th>Année scolaire</th>
            <th>Supprimer</th>
            <th>Modifier</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

<script>
fetch("../backends/notes/read.php")
.then(res => res.json())
.then(data => {

    let table = "";

    data.forEach(note => {
        table += `
        <tr>
            <td>${note.id}</td>
            <td>${note.eleve_nom} ${note.eleve_prenom}</td>
            <td>${note.nom_matiere}</td>
            <td>${note.note}</td>
            <td>${note.semestre}</td>
            <td>${note.annee_scolaire}</td>
            <td>
                <a href="../backends/notes/delete.php?id=${note.id}" 
                   onclick="return confirm('Supprimer cette note ?')"
                   class="btn btn-danger btn-sm">
                    Supprimer
                </a>
            </td>
            <td>
                <a href="edit_note.html?id=${note.id}"
                   class="btn btn-warning btn-sm">
                   Modifier
                </a>
            </td>
        </tr>
        `;
    });

    document.getElementById("data").innerHTML = table;

});
</script>


</body>
</html>
