<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Liste des matières</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Liste des matières</h2>

<a href="ajout_matiere.html" class="btn btn-primary mb-3">Ajouter une matière</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom de la matière</th>
            <th>Date de création</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

<script>
fetch("../backends/matieres/read.php")
.then(res => res.json())
.then(data => {

    let table = "";

    data.forEach(matiere => {
        table += `
        <tr>
            <td>${matiere.id}</td>
            <td>${matiere.nom_matiere}</td>
            <td>${matiere.created_at}</td>
            <td>
                <a href="../backends/matieres/delete.php?id=${matiere.id}" 
                   onclick="return confirm('Supprimer cette matière ?')"
                   class="btn btn-danger btn-sm">
                    Supprimer
                </a>
                <a href="edit_matiere.html?id=${matiere.id}"
                   class="btn btn-warning btn-sm">
                    Modifier
                </a>
            </td>
        </tr>
        `;
    });

    document.getElementById("data").innerHTML = table;

});
</script>

</body>
</html>
