<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comptable - ScolarTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body onload="checkAuth()">
<div id="auth-check" style="display:none;">
    <nav class="navbar navbar-dark bg-success">
        <div class="container-fluid">
            <span class="navbar-brand">ScolarTech - Comptable</span>
            <span class="navbar-text text-white d-none d-sm-inline" id="user-nom"></span>
        </div>
    </nav>
    <div class="container mt-4 mt-sm-5 px-3 px-sm-4">
        <div class="row align-items-center mb-4">
            <div class="col-12 col-sm-8">
                <h2 class="h3 h-sm-2 mb-0">Espace Comptable</h2>
            </div>
            <div class="col-12 col-sm-4 text-sm-end mt-2 mt-sm-0">
                <span class="badge bg-light text-dark" id="user-nom-mobile"></span>
            </div>
        </div>
        
        <div class="row g-3 g-sm-4">
            <div class="col-12 col-md-6 col-lg-4">
                <a href="caisse.html" class="btn btn-success btn-lg w-100 h-100 d-flex align-items-center justify-content-center gap-2">
                    <span>💵</span> Caisse
                </a>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <a href="listepaiement.html" class="btn btn-info btn-lg w-100 h-100 d-flex align-items-center justify-content-center gap-2">
                    <span>📋</span> Historique Paiements
                </a>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <a href="tableau_bord_financier.html" class="btn btn-primary btn-lg w-100 h-100 d-flex align-items-center justify-content-center gap-2">
                    <span>📊</span> Tableau de Bord
                </a>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <a href="insolvables.html" class="btn btn-warning btn-lg w-100 h-100 d-flex align-items-center justify-content-center gap-2">
                    <span>⚠️</span> Élèves Insolvables
                </a>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <button class="btn btn-outline-danger btn-lg w-100 w-sm-auto" onclick="logout()">
                    🚪 Déconnexion
                </button>
            </div>
        </div>
    </div>
</div>
<script>
function checkAuth() {
    fetch('https://gestion-scolaire-production-5e27.up.railway.app/backends/auth/check.php').then(r=>r.json()).then(d=>{
        if(d.authenticated && ['comptable','admin','caisier'].includes(d.user.role)){
            document.getElementById('auth-check').style.display='block';
            document.getElementById('user-nom').textContent=d.user.nom;
            document.getElementById('user-nom-mobile').textContent=d.user.nom;
        } else {
            window.location='connexion.html';
        }
    });
}
function logout(){
    fetch('https://gestion-scolaire-production-5e27.up.railway.app/backends/auth/logout.php').then(()=>window.location='connexion.html');
}
</script>
</body>
</html>
