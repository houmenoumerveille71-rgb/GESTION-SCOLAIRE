<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord Financier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            .container {
                padding: 15px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .card-body h5 {
                font-size: 1rem;
            }
            .display-4 {
                font-size: 1.5rem;
            }
            .row > [class*="col-"] {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body class="container mt-4 mt-sm-5 px-3 px-sm-4">
    <h2 class="h3 h-sm-2 mb-4 mb-sm-3">Tableau de Bord Financier</h2>
    
    <script>
    // Vérification d'authentification (seulement si pas dans un iframe)
    (function() {
        if (window.self === window.top) {
            fetch("../backends/auth/check.php")
                .then(res => res.json())
                .then(data => {
                    if (!data.authenticated) {
                        window.location.href = "connexion.html";
                    }
                })
                .catch(() => {
                    window.location.href = "connexion.html";
                });
        }
    })();
    </script>
    
    <div class="row g-3 g-sm-4">
        <div class="col-12 col-sm-4">
            <div class="card text-white bg-success mb-0 h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                    <h5 class="card-title mb-3">Recettes Totales</h5>
                    <p class="card-text display-4 display-sm-3 mb-0" id="recettes">0 FCFA</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-4">
            <div class="card text-white bg-danger mb-0 h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                    <h5 class="card-title mb-3">Créances Totales</h5>
                    <p class="card-text display-4 display-sm-3 mb-0" id="creances">0 FCFA</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-4">
            <div class="card text-white bg-primary mb-0 h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                    <h5 class="card-title mb-3">Taux de Recouvrement</h5>
                    <p class="card-text display-4 display-sm-3 mb-0" id="taux">0 %</p>
                </div>
            </div>
        </div>
    </div>

    <script>
    fetch("../backends/paiements/stats.php")
        .then(res => res.json())
        .then(data => {
            document.getElementById("recettes").textContent = new Intl.NumberFormat('fr-FR').format(data.recettes_totales) + " FCFA";
            document.getElementById("creances").textContent = new Intl.NumberFormat('fr-FR').format(data.creances_totales) + " FCFA";
            document.getElementById("taux").textContent = data.taux_recouvrement + " %";
        });
    </script>
</body>
</html>
