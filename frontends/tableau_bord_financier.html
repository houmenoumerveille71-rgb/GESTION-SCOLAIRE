<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tableau de Bord Financier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Tableau de Bord Financier</h2>
     
    <script>
    // Vérification d'authentification (seulement si pas dans un iframe)
    (function() {
        if (window.self === window.top) {
            fetch("../backends/auth/check.php")
                .then(res => res.json())
                .then(data => {
                    if (!data.authenticated) {
                        window.location.href = "connexion.html";
                    }
                })
                .catch(() => {
                    window.location.href = "connexion.html";
                });
        }
    })();
    </script>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card text-white bg-success mb-3">
                <div class="card-body">
                    <h5 class="card-title">Recettes Totales</h5>
                    <p class="card-text display-4" id="recettes">0 FCFA</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger mb-3">
                <div class="card-body">
                    <h5 class="card-title">Créances Totales</h5>
                    <p class="card-text display-4" id="creances">0 FCFA</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3">
                <div class="card-body">
                    <h5 class="card-title">Taux de Recouvrement</h5>
                    <p class="card-text display-4" id="taux">0 %</p>
                </div>
            </div>
        </div>
    </div>

    <script>
    fetch("../backends/paiements/stats.php")
        .then(res => res.json())
        .then(data => {
            document.getElementById("recettes").textContent = new Intl.NumberFormat('fr-FR').format(data.recettes_totales) + " FCFA";
            document.getElementById("creances").textContent = new Intl.NumberFormat('fr-FR').format(data.creances_totales) + " FCFA";
            document.getElementById("taux").textContent = data.taux_recouvrement + " %";
        });
    </script>
</body>
</html>
