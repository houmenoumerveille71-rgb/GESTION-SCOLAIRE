<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste Enseignants - ScolarTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        @media (max-width: 576px) {
            .container {
                padding: 15px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .table-responsive {
                font-size: 0.85rem;
            }
            .btn-group-actions {
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .btn-group-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body class="container mt-4 mt-sm-5 px-3 px-sm-4">

<h2 class="h3 h-sm-2 mb-4 mb-sm-3">Liste des enseignants</h2>

<div class="d-flex flex-column flex-sm-row gap-2">
    <a href="ajout_enseignant.html" class="btn btn-primary btn-lg w-100 w-sm-auto">Ajouter un enseignant</a>
</div>

<div class="table-responsive">
<table class="table table-bordered table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Téléphone</th>
            <th>Email</th>
            <th>Date création</th>
            <th class="text-center">Actions</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>
</div>

<script>
fetch("https://gestion-scolaire-production-5e27.up.railway.app/backends/enseignants/read.php")
.then(res => res.json())
.then(data => {

    let table = "";

    data.forEach(enseignant => {
        table += `
        <tr>
            <td>${enseignant.id}</td>
            <td>${enseignant.nom}</td>
            <td>${enseignant.telephone || ''}</td>
            <td>${enseignant.email || ''}</td>
            <td>${enseignant.created_at}</td>
            <td class="text-center">
                <div class="btn-group-actions">
                    <a href="https://gestion-scolaire-production-5e27.up.railway.app/backends/enseignants/delete.php?id=${enseignant.id}" 
                       onclick="return confirm('Supprimer cet enseignant ?')"
                       class="btn btn-danger btn-sm">
                        Supprimer
                    </a>
                    <a href="edit_enseignant.html?id=${enseignant.id}"
                       class="btn btn-warning btn-sm">
                        Modifier
                    </a>
                </div>
            </td>
        </tr>
        `;
    });

    document.getElementById("data").innerHTML = table;

});
</script>

</body>
</html>
