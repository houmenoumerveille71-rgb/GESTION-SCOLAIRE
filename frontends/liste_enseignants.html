<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Liste enseignants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Liste des enseignants</h2>

<a href="ajout_enseignant.html" class="btn btn-primary mb-3">Ajouter un enseignant</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Téléphone</th>
            <th>Email</th>
            <th>Date création</th>
            <th>Supprimer</th>
            <th>Modifier</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

<script>
fetch("../backends/enseignants/read.php")
.then(res => res.json())
.then(data => {

    let table = "";

    data.forEach(enseignant => {
        table += `
        <tr>
            <td>${enseignant.id}</td>
            <td>${enseignant.nom}</td>
            <td>${enseignant.telephone || ''}</td>
            <td>${enseignant.email || ''}</td>
            <td>${enseignant.created_at}</td>
            <td>
                <a href="../backends/enseignants/delete.php?id=${enseignant.id}" 
                   onclick="return confirm('Supprimer cet enseignant ?')"
                   class="btn btn-danger btn-sm">
                    Supprimer
                </a>
                </td>
            <td>
                <a href="edit_enseignant.html?id=${enseignant.id}"
                   class="btn btn-warning btn-sm">
                    Modifier
                </a>
            </td>
        </tr>
        `;
    });

    document.getElementById("data").innerHTML = table;

});
</script>

</body>
</html>
