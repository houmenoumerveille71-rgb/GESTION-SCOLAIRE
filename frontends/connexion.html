<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Gestion Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            .login-container {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="login-container w-100" style="max-width: 400px;">
            <div class="bg-white rounded-3 p-4 p-sm-5 mx-3 mx-sm-0 shadow-sm">
                <div class="logo text-center mb-4 mb-sm-5">
                    <h2 class="text-primary mb-1">Gestion Scolaire</h2>
                    <p class="text-muted mb-0">Connexion administrateur</p>
                </div>
                
                <div id="alert-message" class="alert d-none" role="alert"></div>
                
                <form id="loginForm">
                    <div class="mb-3 mb-sm-4">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" required>
                    </div>
                    <div class="mb-3 mb-sm-4">
                        <label for="mot_de_passe" class="form-label">Mot de passe</label>
                        <input type="password" class="form-control form-control-lg" id="mot_de_passe" name="mot_de_passe" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">Se connecter</button>
                </form>
                
                <div class="mt-3 mt-sm-4 text-center">
                    <p class="mb-0">Pas encore de compte ? <a href="inscription.html" class="text-decoration-none">Inscrivez-vous ici</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const alertDiv = document.getElementById('alert-message');
            const submitButton = this.querySelector('button[type="submit"]');
            
            // Désactiver le bouton pendant la requête
            submitButton.disabled = true;
            submitButton.textContent = 'Connexion en cours...';
            
            // Transformation des données du formulaire en objet JSON
            const formData = new FormData(this);
            const formObject = {};
            formData.forEach((value, key) => {
                formObject[key] = value;
            });
            
            // Ton URL de production Railway officielle
            const urlProductionRailway = 'https://gestion-scolaire-production-5e27.up.railway.app/backends/auth/login.php';
            
            fetch(urlProductionRailway, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formObject)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Erreur serveur (' + response.status + ')');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    // Sauvegarde des infos de l'utilisateur connecté dans le navigateur
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Redirection directe vers la page fournie par le backend
                    window.location.href = data.redirect;
                } else {
                    alertDiv.className = 'alert alert-danger';
                    alertDiv.textContent = data.message;
                    alertDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Erreur de connexion : ' + error.message;
                alertDiv.classList.remove('d-none');
            })
            .finally(() => {
                submitButton.disabled = false;
                submitButton.textContent = 'Se connecter';
            });
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
