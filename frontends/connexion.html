<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Gestion Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="logo">
                <h2>Gestion Scolaire</h2>
                <p class="text-muted">Connexion administrateur</p>
            </div>
            
            <div id="alert-message" class="alert d-none" role="alert"></div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="mot_de_passe" class="form-label">Mot de passe</label>
                    <input type="password" class="form-control" id="mot_de_passe" name="mot_de_passe" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
            
            <div class="mt-3 text-center">
                <p>Pas encore de compte ? <a href="inscription.html">Inscrivez-vous ici</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const alertDiv = document.getElementById('alert-message');
            const submitButton = this.querySelector('button[type="submit"]');
            
            // Désactiver le bouton pendant la requête
            submitButton.disabled = true;
            submitButton.textContent = 'Connexion en cours...';
            
            // Transformation des données du formulaire en objet JSON
            const formData = new FormData(this);
            const formObject = {};
            formData.forEach((value, key) => {
                formObject[key] = value;
            });
            
            // Ton URL de production Railway officielle
            const urlProductionRailway = 'https://gestion-scolaire-production-5e27.up.railway.app/backends/auth/login.php';
            
            fetch(urlProductionRailway, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formObject)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Erreur serveur (' + response.status + ')');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    // Sauvegarde des infos de l'utilisateur connecté dans le navigateur
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Redirection directe vers la page fournie par le backend
                    window.location.href = data.redirect;
                } else {
                    alertDiv.className = 'alert alert-danger';
                    alertDiv.textContent = data.message;
                    alertDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Erreur de connexion : ' + error.message;
                alertDiv.classList.remove('d-none');
            })
            .finally(() => {
                submitButton.disabled = false;
                submitButton.textContent = 'Se connecter';
            });
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
