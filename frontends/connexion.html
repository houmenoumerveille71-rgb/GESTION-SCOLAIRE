<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ScolarTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8fafc; /* Fond ultra-sobre assorti à l'admin */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-control {
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 11px 14px;
            font-size: 14px;
            color: #0f172a;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #94a3b8;
            box-shadow: none;
        }

        .btn-login {
            background-color: #0f172a; /* Bouton sombre pro */
            color: #ffffff;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            border: none;
            width: 100%;
            transition: background 0.2s ease;
            margin-top: 8px;
        }

        .btn-login:hover {
            background-color: #1e293b;
        }

        .btn-login:disabled {
            background-color: #64748b;
            cursor: not-allowed;
        }

        .register-link {
            font-size: 14px;
            color: #64748b;
            text-align: center;
            margin-top: 24px;
        }

        .register-link a {
            color: #0f172a;
            font-weight: 500;
        }

        .register-link a:hover {
            color: #334155;
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-title">Gestion Scolaire</div>
        <div class="login-subtitle">Espace de connexion sécurisé</div>
        
        <div id="alert-message" class="alert d-none" role="alert" style="font-size: 14px; padding: 12px 16px; border-radius: 8px;"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Adresse Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="exemple@ecole.com" required>
            </div>
            <div class="mb-4">
                <label for="mot_de_passe" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="mot_de_passe" name="mot_de_passe" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Se connecter</button>
        </form>
        
        <div class="register-link">
            <p class="mb-0">Pas encore de compte ? <a href="inscription.html" class="text-decoration-none">Inscrivez-vous</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const alertDiv = document.getElementById('alert-message');
            const submitButton = this.querySelector('button[type="submit"]');
            
            alertDiv.classList.add('d-none');
            submitButton.disabled = true;
            submitButton.textContent = 'Connexion en cours...';
            
            const formData = new FormData(this);
            const formObject = {};
            formData.forEach((value, key) => {
                formObject[key] = value;
            });
            
            const urlProductionRailway = 'https://gestion-scolaire-production-5e27.up.railway.app/backends/auth/login.php';
            
            fetch(urlProductionRailway, {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formObject)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Erreur serveur (' + response.status + ')');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = data.redirect;
                } else {
                    alertDiv.className = 'alert alert-danger';
                    alertDiv.textContent = data.message;
                    alertDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                alertDiv.className = 'alert alert-danger';
                alertDiv.textContent = 'Erreur de connexion : ' + error.message;
                alertDiv.classList.remove('d-none');
            })
            .finally(() => {
                submitButton.disabled = false;
                submitButton.textContent = 'Se connecter';
            });
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
