<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard Content</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body {
            background: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
        }
        
        .dashboard-body {
            padding: 30px;
        }

        .dashboard-body .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 25px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            border-radius: 15px;
            padding: 25px;
            color: #ffffff;
            position: relative;
            overflow: hidden;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-purple { background: linear-gradient(135deg, #a855f7, #6366f1); }
        .card-blue { background: linear-gradient(135deg, #3b82f6, #06b6d4); }

        .stat-card .card-top {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-card .card-top i {
            font-size: 18px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .stat-card .card-top .title {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.85;
        }

        @media (min-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 992px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-body">
        <div class="section-title">Dashboard</div>

        <div class="cards-grid">
            <div class="stat-card card-purple">
                <div class="card-top">
                    <i class="fa-solid fa-desktop"></i>
                    <div class="title">TOTAL ELEVES</div>
                </div>
                <div class="card-bottom">
                    <span class="value" id="total-eleves">0</span>
                </div>
            </div>

            <div class="stat-card card-blue">
                <div class="card-top">
                    <i class="fa-solid fa-file-invoice"></i>
                    <div class="title">TOTAL ENCAISSÉ</div>
                </div>
                <div class="card-bottom">
                    <span class="value" id="total-encaisse">0 FCFA</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    async function loadStats() {
        try {
            const response = await fetch('https://gestion-scolaire-production-5e27.up.railway.app/backends/dashboard_stats.php');
            const data = await response.json();
            
            if (data.success) {
                // Tout s'est bien passé côté PHP, on injecte les chiffres
                document.getElementById('total-eleves').textContent = new Intl.NumberFormat('fr-FR').format(data.total_eleves ?? 0);
                document.getElementById('total-encaisse').textContent = new Intl.NumberFormat('fr-FR').format(data.total_encaisse ?? 0) + ' FCFA';
            } else {
                // Le PHP a renvoyé success: false (Erreur SQL). On l'affiche en rouge dans la console pour debugger
                console.error("Erreur renvoyée par le serveur :", data.message);
                document.getElementById('total-eleves').textContent = "0";
                document.getElementById('total-encaisse').textContent = "0 FCFA";
            }
        } catch (error) {
            console.error('Impossible de joindre l\'API dashboard_stats.php :', error);
            document.getElementById('total-eleves').textContent = "0";
            document.getElementById('total-encaisse').textContent = "0 FCFA";
        }
    }
    
    document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
