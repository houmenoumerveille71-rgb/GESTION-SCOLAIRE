<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modifier une matière</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Modifier une matière</h2>

<form action="../backends/matieres/update.php" method="POST">
    
    <!-- ID caché -->
    <input type="hidden" name="id" id="id">

    <!-- Nom de la matière -->
    <div class="mb-3">
        <label for="nom_matiere" class="form-label">Nom de la matière *</label>
        <input type="text" name="nom_matiere" class="form-control" id="nom_matiere" required>
    </div>
    
    <!-- Bouton -->
    <button type="submit" class="btn btn-success">
        Modifier
    </button>
    <a href="liste_matieres.html" class="btn btn-secondary">Annuler</a>
    
</form>

<script>
// Récupérer ID URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// Charger les matières
fetch("../backends/matieres/read.php")
.then(res => res.json())
.then(data => {
    // Trouver la matière
    let matiere = data.find(m => m.id == id);

    if (matiere) {
        // Remplir formulaire
        document.getElementById("id").value = matiere.id;
        document.getElementById("nom_matiere").value = matiere.nom_matiere;
    } else {
        alert("Matière non trouvée");
        window.location.href = "liste_matieres.html";
    }
});

</script>

</body>
</html>
